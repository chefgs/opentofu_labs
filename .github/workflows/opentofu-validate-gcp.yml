name: OpenTofu GCP Validate

on:
  push:
    paths:
      - "gcp/**"
  pull_request:
    paths:
      - "gcp/**"

jobs:
  validate:
    name: OpenTofu GCP Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - gcp/01-vpc-network
          - gcp/02-compute-instance
          - gcp/03-cloud-storage-bucket
          - gcp/04-firewall-rules
          - gcp/05-instance-with-module

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8.0"

      - name: OpenTofu Format Check
        run: tofu fmt -check -recursive
        working-directory: ${{ matrix.example }}

      - name: OpenTofu Init
        run: tofu init -backend=false
        working-directory: ${{ matrix.example }}

      - name: OpenTofu Validate
        run: tofu validate
        working-directory: ${{ matrix.example }}
