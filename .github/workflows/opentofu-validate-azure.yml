name: OpenTofu Azure Validate

on:
  push:
    paths:
      - "azure/**"
  pull_request:
    paths:
      - "azure/**"

jobs:
  validate:
    name: OpenTofu Azure Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - azure/01-resource-group
          - azure/02-virtual-network
          - azure/03-linux-vm
          - azure/04-storage-account
          - azure/05-vm-with-module

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.8.0"

      - name: OpenTofu Format Check
        run: tofu fmt -check -recursive
        working-directory: ${{ matrix.example }}

      - name: OpenTofu Init
        run: tofu init -backend=false
        working-directory: ${{ matrix.example }}

      - name: OpenTofu Validate
        run: tofu validate
        working-directory: ${{ matrix.example }}
